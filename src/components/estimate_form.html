<div class="form-card">
  <h2 style="margin-bottom:8px;">Request a free estimate</h2>
  <p class="mb-4" style="margin-bottom:18px; font-size:14px; color:var(--muted);">Required fields are marked with an orange dot. Your information stays private.</p>

  <form data-leadform data-redirect="@@root_path/thank-you.html" novalidate>
    <div class="form-row two">
      <div class="form-field">
        <label for="firstname">First name<span class="req">●</span></label>
        <input id="firstname" name="firstname" type="text" required placeholder="Robert">
      </div>
      <div class="form-field">
        <label for="lastname">Last name</label>
        <input id="lastname" name="lastname" type="text" placeholder="Doe">
      </div>
    </div>

    <div class="form-row two">
      <div class="form-field">
        <label for="phone">Phone<span class="req">●</span></label>
        <input id="phone" name="phone" type="tel" required placeholder="@@phone_number">
      </div>
      <div class="form-field">
        <label for="email">Email<span class="req">●</span></label>
        <input id="email" name="email" type="email" required placeholder="you@email.com">
      </div>
    </div>

    <div class="form-row two">
      <div class="form-field">
        <label for="service">Service needed<span class="req">●</span></label>
        <select id="service" name="service" required>
          <option value="">Select a service…</option>
          <option>AC Repair</option>
          <option>AC Installation / Replacement</option>
          <option>AC Tune-Up / Maintenance</option>
          <option>Heating Repair</option>
          <option>Heat Pump / Furnace Installation</option>
          <option>Duct Cleaning / Sealing</option>
          <option>Commercial HVAC</option>
          <option>Other / Not sure yet</option>
        </select>
      </div>
      <div class="form-field">
        <label for="zip">ZIP code</label>
        <input id="zip" name="zip" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="@@zip" maxlength="5">
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="project">Tell us more about your project</label>
        <textarea id="project" name="project" style="min-height:80px;" placeholder="Briefly describe what's going on..."></textarea>
      </div>
    </div>

    <button class="btn btn-primary btn-lg" type="submit" style="width:100%;">
      Send My Request
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
    <p class="form-disclaimer">By submitting, you agree to be contacted by @@business_name about your service request.</p>
  </form>
</div>
